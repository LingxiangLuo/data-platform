name: Sync Upstream

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync main from upstream
        run: |
          git remote add upstream https://github.com/barryLiu199/data-platform-mvp.git
          git fetch upstream main

          git checkout -B main origin/main
          git reset --hard upstream/main

          # 上游没有 .github/workflows/，reset 后把 CI 文件从 origin/main 恢复回来
          git fetch origin main
          git checkout origin/main -- .github/workflows/ 2>/dev/null || true

          if ! git diff --quiet HEAD; then
            git commit -m "ci: restore workflows after upstream sync"
          fi

          git push origin main --force

      - name: Merge main into dev
        run: |
          git fetch origin dev
          git checkout dev
          git reset --hard origin/dev

          if git merge origin/main --no-edit; then
            git push origin dev
            echo "✅ dev synced with upstream"
          else
            # 对 .github/workflows/ 冲突直接保留 dev 版本
            if git diff --name-only --diff-filter=U | grep -qv '.github/workflows/'; then
              echo "⚠️ Non-workflow merge conflict — resolve manually"
              git diff --name-only --diff-filter=U
              git merge --abort
              exit 1
            fi
            # 只有 workflows 冲突：保留 dev 版本后继续
            git checkout --ours .github/workflows/
            git add .github/workflows/
            git commit --no-edit -m "ci: merge origin/main into dev, keep dev workflows"
            git push origin dev
            echo "✅ dev synced (workflow conflicts auto-resolved)"
          fi
