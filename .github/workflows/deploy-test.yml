name: Deploy to Test

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Sync code to test server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='dist' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='*.pyc' \
            --exclude='portal/frontend/dist' \
            --exclude='portal/backend/.venv' \
            --exclude='drivers' \
            --exclude='datax' \
            --exclude='.env' \
            -e "ssh -i $HOME/.ssh/test_server_key -o StrictHostKeyChecking=no" \
            ./ \
            root@192.168.1.3:/opt/data-platform-mvp/

      - name: Build and restart services
        run: |
          ssh -i $HOME/.ssh/test_server_key -o StrictHostKeyChecking=no root@192.168.1.3 "
            cd /opt/data-platform-mvp

            docker compose build portal-frontend portal-backend

            docker compose stop portal-frontend portal-backend nginx 2>/dev/null || true
            docker compose up -d

            echo 'Waiting for services...'
            for i in \$(seq 1 20); do
              if curl -sf http://localhost:8888/ > /dev/null 2>&1; then
                echo 'Service is up'
                break
              fi
              sleep 3
            done

            docker compose ps --format 'table {{.Name}}\t{{.Status}}'
          "

      - name: Print deploy summary
        run: |
          echo "✅ Deployed commit ${{ github.sha }} to test server"
          echo "   Branch : ${{ github.ref_name }}"
          echo "   Trigger: ${{ github.event_name }}"
          echo "   URL    : http://192.168.1.3:8888"
