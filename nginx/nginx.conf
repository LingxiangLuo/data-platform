worker_processes auto;
events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 100m;

    # 隐藏 Nginx 版本号
    server_tokens off;

    # 基础安全响应头部（全局）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 速率限制：每 IP 每秒 10 个请求，突发 20 个
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # 禁止访问敏感文件和目录
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        location ~ \.(env|git|docker|yaml|yml|json|lock|md)$ {
            deny all;
            access_log off;
            log_not_found off;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        # HTML 不缓存，确保每次拿到最新 JS/CSS 引用
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # 带 hash 的静态资源长期缓存
        location /assets/ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://portal-backend:8000/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        # DolphinScheduler UI 已锁死:不对公网开放,仅 portal-backend 通过 Docker 内网访问
        # http://dolphinscheduler:12345/dolphinscheduler

        # OpenMetadata — 已停用，容器已关闭
        # location /openmetadata/ {
        #     proxy_pass http://openmetadata-server:8585/;
        # }

        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
}
