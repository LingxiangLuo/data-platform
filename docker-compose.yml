  # ============================================
  # Portal Backend - FastAPI (不对外暴露端口)
  # ============================================
  portal-backend:
    build:
      context: ./portal/backend
      dockerfile: Dockerfile
    container_name: dmp-portal-api
    restart: always
    env_file: .env
    environment:
      DATABASE_URL: mysql+pymysql://root:${MYSQL_ROOT_PASSWORD}@mysql:3306/portal_db
      SECRET_KEY: ${PORTAL_SECRET_KEY}
      DS_API_URL: http://dolphinscheduler:12345/dolphinscheduler
      OM_API_URL: http://openmetadata-server:8585
      DATAX_HOME: /opt/datax
      DATAX_JOBS_DIR: /opt/datax/jobs
      DATAX_EXEC_CONTAINER: dmp-ds
    expose:
      - "8000"
    volumes:
      - ./datax:/opt/datax
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - dmp-net

  # ============================================
  # Nginx - 统一入口 (唯一对外暴露端口的服务)
  #   - 前端静态文件直接 serve
  #   - 反向代理后端 API / DS / OM
  # ============================================
  nginx:
    image: nginx:1.25-alpine
    container_name: dmp-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - portal-backend
      - portal-frontend
    networks:
      - dmp-net

  # ============================================
  # Portal Frontend - 仅用于构建阶段
  #   构建完成后由 Nginx 直接 serve 静态文件
  # ============================================
  portal-frontend:
    build:
      context: ./portal/frontend
      dockerfile: Dockerfile
    container_name: dmp-portal-web
    restart: "no"
    volumes:
      - frontend_dist:/output
    networks:
      - dmp-net

volumes:
  mysql_data:
  redis_data:
  ds_logs:
  om_data:
  es_data:
  nginx_logs:
  frontend_dist:

networks:
  dmp-net:
    driver: bridge
